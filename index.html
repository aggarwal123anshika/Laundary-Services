<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Color Greeting App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h2 id="greeting">Hello</h2>

    <!-- Color Boxes -->
    <div class="colors">
        <div class="box red" onclick="changeColor('red')">Red</div>
        <div class="box blue" onclick="changeColor('blue')">Blue</div>
        <div class="box green" onclick="changeColor('green')">Green</div>
        <div class="box yellow" onclick="changeColor('yellow')">Yellow</div>
    </div>

    <!-- Input + Button -->
    <div class="input-section">
        <input type="text" id="nameInput" placeholder="Enter name">
        <button onclick="greetUser()">Greet</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
